<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berlin Admin – Gewählte Vertreter nach Wahlkreis</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/shapefile@0.6.6/dist/shapefile.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="legal-bar">
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
  </div>

  <header>
    <div class="header-title">
      <h1>Berlin Admin</h1>
      <span class="subtitle">Gewählte Vertreter nach Wahlkreis</span>
    </div>
    <div class="level-tabs">
      <button class="tab" onclick="setLevel('bezirk')">Bezirk (BVV)</button>
      <button class="tab active" onclick="setLevel('abgeordnetenhaus')">Stadt (AGH)</button>
      <button class="tab" onclick="setLevel('bundestag')">Bundestag</button>
      <button class="tab" onclick="setLevel('eu')">EU-Parlament</button>
    </div>
  </header>

  <div class="main">
    <div id="map"></div>
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="district-name-banner">
          <div class="bezirk-nr" id="districtHeaderNr">Wahlkreis</div>
          <h2 id="districtHeaderName">Auf der Karte auswählen</h2>
        </div>
      </div>
      <div class="district-info" id="districtInfo">
        <div class="empty-state">
          <div class="empty-icon">🗺️</div>
          <div class="empty-text">Wahlkreis auf der Karte auswählen</div>
        </div>
      </div>
      <div class="legend" id="legend"></div>
      <div class="data-note">Daten: Abgeordnetenhauswahl 12.02.2023 · Bundestagswahl 23.02.2025 · Europawahl 09.06.2024
        · BVV-Wahl 12.02.2023</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>

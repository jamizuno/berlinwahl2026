    --border: #252b38;

    --accent: #c8a96e;
    --accent2: #5b8fd4;
    --CDU: #2563a8;
    --SPD: #d4263c;
    --Grüne: #3a8c4e;

    --AfD: #1b6fb5;
    --FDP: #e8c12a;

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    gap: 24px;
    flex-wrap: wrap;
  }

  .header-title {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .level-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    padding: 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .tab {
    padding: 6px 14px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    background: var(--accent);
    color: #0d0f14;
    font-weight: 600;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    overflow: hidden;
  }

  #map {
    width: 100%;
    height: 100%;
    background: #0d0f14;
  }

  .leaflet-container { background: #0d0f14 !important; }

  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-hint {
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.5;
  }

  .district-info {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .district-info::-webkit-scrollbar { width: 4px; }
  .district-info::-webkit-scrollbar-track { background: transparent; }
  .district-info::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .district-name-banner {
    padding: 20px 24px;
    background: linear-gradient(135deg, #1a1f2e 0%, #161a22 100%);
    border-bottom: 1px solid var(--border);
  }

  .district-name-banner h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.1;
  }

  .district-name-banner .bezirk-nr {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .rep-card {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .rep-card:hover { background: rgba(255,255,255,0.02); }

  .rep-card.list-entry {
    padding: 12px 24px;
    opacity: 0.9;
  }

  .rep-card.list-entry .rep-level { font-size: 0.6rem; }
  .rep-card.list-entry .rep-name { font-size: 0.9rem; }
  .rep-card.list-entry .rep-party { font-size: 0.65rem; padding: 1px 6px; }
  .rep-card.list-entry .rep-role { font-size: 0.7rem; }

  .rep-level {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .rep-name {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .rep-party {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.04em;
  }

  .rep-role {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;

  .party-CDU { background: rgba(17,17,17,0.35); color: #e6e6e6; border: 1px solid rgba(17,17,17,0.6); }
  .party-SPD { background: rgba(212,38,60,0.25); color: #f08090; border: 1px solid rgba(212,38,60,0.4); }
  .party-Grüne { background: rgba(58,140,78,0.25); color: #7dd492; border: 1px solid rgba(58,140,78,0.4); }
  .party-Linke { background: rgba(155,46,207,0.25); color: #c98af0; border: 1px solid rgba(155,46,207,0.4); }
  .party-AfD { background: rgba(27,111,181,0.25); color: #6ab0f0; border: 1px solid rgba(27,111,181,0.4); }
  .party-FDP { background: rgba(232,193,42,0.25); color: #f0d96a; border: 1px solid rgba(232,193,42,0.4); }
  .party-fraktionslos { background: rgba(156,163,175,0.25); color: #c4c8d2; border: 1px solid rgba(156,163,175,0.4); }

  .empty-state {
    padding: 32px 24px;
    text-align: center;
  }

  .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-text {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.6;
  }

  .legend {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .data-note {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    font-size: 0.68rem;
    color: var(--muted);
    line-height: 1.5;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>

  const seen = new Set();
  const list = [];
  Object.values(bezirkeData).forEach(entry => {
    (entry.eu || []).forEach(rep => {
      const key = `${rep.name}|${rep.party}|${rep.role}`;
      if (seen.has(key)) return;
      seen.add(key);
      list.push(rep);
    });
  });
  return list;
})();

  maxZoom: 19
}).addTo(map);

const wfsDefaults = {
  version: "2.0.0",
  outputFormat: "application/json",
  srsName: "EPSG:4326"
};

function ensurePane(name, zIndex) {
  if (map.getPane(name)) return;
  map.createPane(name);
  map.getPane(name).style.zIndex = zIndex;
}

function buildUrlWithParams(baseUrl, params) {
  const url = new URL(baseUrl);
  Object.entries(params).forEach(([key, value]) => {
    url.searchParams.set(key, value);
  });
  return url.toString();
}

function buildWfsCapsUrl(baseUrl) {
  return buildUrlWithParams(baseUrl, {
    service: "WFS",
    request: "GetCapabilities"
  });
}

function buildWfsGetFeatureUrl(baseUrl, typeName, outputFormat = wfsDefaults.outputFormat) {
  return buildUrlWithParams(baseUrl, {
    service: "WFS",
    request: "GetFeature",
    version: wfsDefaults.version,
    typeNames: typeName,
    outputFormat,
    srsName: wfsDefaults.srsName
  });
}

async function fetchWfsTypeNames(baseUrl) {
  const capsUrl = buildWfsCapsUrl(baseUrl);
  const res = await fetch(capsUrl);
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, "text/xml");
  const featureTypes = Array.from(xml.getElementsByTagNameNS("*", "FeatureType"));
  return featureTypes
    .map(ft => ft.getElementsByTagNameNS("*", "Name")[0]?.textContent)
    .filter(Boolean);
}

async function resolveTypeName(baseUrl, preferredTypeNames = []) {
  const names = await fetchWfsTypeNames(baseUrl);
  if (!names || names.length === 0) return null;
  for (const pref of preferredTypeNames) {
    if (names.includes(pref)) return pref;
  }
  return names[0];
}

function pickTooltipText(feature, props) {
  if (!feature?.properties) return null;
  for (const key of props || []) {
    const value = feature.properties[key];
    if (value !== null && value !== undefined && String(value).trim() !== "") {
      return String(value).trim();
    }
  }
  return null;
}

function isUselessTooltip(value) {
  if (value === null || value === undefined) return true;
  const text = String(value).trim();
  if (!text) return true;
  if (text === "AX_KommunalesGebiet") return true;
  return false;
}

function getOrtsteilTooltip(feature, props) {
  const preferred = pickTooltipText(feature, props);
  if (preferred && !isUselessTooltip(preferred) && !/^\d+$/.test(preferred)) {
    return preferred;
  }
  const fallback = pickNameLikeProperty(feature);
  if (fallback && !isUselessTooltip(fallback)) return fallback;
  return null;
}

function buildOverlayLayer(data, layerConfig, baseStyle) {
  const { id, pane, tooltipProps } = layerConfig;
  return L.geoJSON(data, {
    pane,
    style: baseStyle,
    onEachFeature: (feature, lyr) => {
      const tooltip = id === "eu"
        ? null
        : id === "bezirke"
        ? getBezirkNameFromFeature(feature)
        : id === "ortsteile"
        ? getOrtsteilTooltip(feature, tooltipProps)
        : pickTooltipText(feature, tooltipProps);
      if (tooltip) {
        lyr.bindTooltip(tooltip, {
          permanent: false,
          direction: "center",
          className: "district-tooltip",
          opacity: 0.9
        });
      }
      lyr.on("click", () => handleLayerClick(id, feature));
    }
  });
}

function pickNameLikeProperty(feature) {
  if (!feature?.properties) return null;
  for (const [key, value] of Object.entries(feature.properties)) {
    if (!key) continue;
    if (!/name|bez|ort|teil/i.test(key)) continue;
    const text = String(value ?? "").trim();
    if (!text) continue;
    if (/^\d+$/.test(text)) continue;
    if (isUselessTooltip(text)) continue;
    return text;
  }
  return null;
}

function getBezirkNameFromFeature(feature) {
  const rawName = pickProp(feature, ["name", "bezirk", "bezeichnung", "bezirkname", "bezirk_name", "gen"]);
  if (rawName) {
    const trimmed = String(rawName).trim();
    if (trimmed && !/^\d+$/.test(trimmed)) return trimmed;
    const codeFromName = normalizeArkis(trimmed);
    const mapped = bezirkByArkis.get(codeFromName);
    if (mapped) return mapped;
  }
  const code = pickProp(feature, ["ars", "arkis", "rsb", "rs", "schluessel", "bezirksschluessel", "gkz", "ags"]);
  const normalized = normalizeArkis(code);
  if (normalized) {
    const mapped = bezirkByArkis.get(normalized);
    if (mapped) return mapped;
  }
  return rawName ? String(rawName).trim() : null;
}

function rebuildOverlayControl() {
  if (!map) return;
  if (overlayControl) {
    map.removeControl(overlayControl);
  }
  overlayControl = L.control.layers(null, {}, { collapsed: false }).addTo(map);

  const labelById = new Map();
  wfsLayers.forEach(layer => labelById.set(layer.id, layer.label));
  labelById.set("agh", "AGH Wahlbezirke");

  overlayOrder.forEach(id => {
    const layer = id === "agh" ? aghOverlay : wfsOverlayLayers.get(id);
    if (!layer) return;
    const label = labelById.get(id) || id;
    overlayControl.addOverlay(layer, label);
  });
}

async function addWfsOverlayLayer(layerConfig) {
  const {
    id,
    label,
    url,
    preferredTypeNames,
    pane,
    zIndex,
    style,
    tooltipProps,
    defaultOn
  } = layerConfig;

  const baseStyle = style || {};
  try {
    ensurePane(pane, zIndex);
    const typeName = await resolveTypeName(url, preferredTypeNames);
    if (!typeName) throw new Error(`No WFS typename found for ${label}`);
    const featureUrl = buildWfsGetFeatureUrl(url, typeName);
    let data = null;
    try {
      const res = await fetch(featureUrl);
      data = await res.json();
    } catch (err) {
      const altUrl = buildWfsGetFeatureUrl(url, typeName, "application/json; subtype=geojson");
      const altRes = await fetch(altUrl);
      data = await altRes.json();
    }
    const layer = buildOverlayLayer(data, layerConfig, baseStyle);
    wfsOverlayLayers.set(id, layer);
    if (defaultOn) layer.addTo(map);
  } catch (err) {
    console.warn(`WFS layer failed: ${label}`, err);
    if (id === "btg") {
      try {
        ensurePane(pane, zIndex);
        const localData = await loadBtgGeoJSONFromShapefile();
        const layer = buildOverlayLayer(localData, layerConfig, baseStyle);
        wfsOverlayLayers.set(id, layer);
        if (defaultOn) layer.addTo(map);
        return;
      } catch (localErr) {
        console.warn("BTG local shapefile fallback failed.", localErr);
      }
    }
    // Keep the layer in the UI list even if loading fails.
    const fallback = L.geoJSON([], { pane, style: baseStyle });
    wfsOverlayLayers.set(id, fallback);
  }
}

async function initOverlayLayers() {
  await Promise.all(wfsLayers.map(addWfsOverlayLayer));
  rebuildOverlayControl();
}

// -----------------------------------------------------------------------
// GeoJSON – generated at runtime from QGIS data (AWK_AH2026.shp + CSV)
// -----------------------------------------------------------------------
proj4.defs("EPSG:25833", "+proj=utm +zone=33 +ellps=GRS80 +units=m +no_defs +type=crs");

function normalizeBez(value) {
  if (value === null || value === undefined) return "";
  return String(value).padStart(2, "0");
}

function normalizeAwk(value) {
  if (value === null || value === undefined) return "";
  return String(value).padStart(4, "0");
}

function normalizeParty(value) {
  const raw = String(value || "").trim();
  const upper = raw.toUpperCase();
  if (upper.includes("BÜNDNIS 90") || upper === "GRÜNE" || upper === "GRUENE" || upper === "BÜ 90/GRÜNE" || upper === "BU 90/GRUENE") return "Grüne";
  if (upper === "DIE LINKE" || upper === "LINKE") return "Linke";
  if (upper === "CDU" || upper.includes("CHRISTLICH DEMOKRATISCHE UNION")) return "CDU";
  if (upper === "SPD" || upper.includes("SOZIALDEMOKRATISCHE")) return "SPD";
  if (upper === "FDP" || upper.includes("FREIE DEMOKRATISCHE")) return "FDP";
  if (upper === "AFD" || upper.includes("ALTERNATIVE FÜR DEUTSCHLAND")) return "AfD";
  if (upper === "FRAKTIONSLOS" || upper === "EINZELVERORDNETE" || upper === "EINZELVERORDNETER") return "fraktionslos";
  return raw;
}

function normalizeArkis(value) {
  if (value === null || value === undefined) return "";
  const raw = String(value).trim();
  if (!raw) return "";
  const digits = raw.replace(/\D/g, "");
  if (digits.length >= 8) return digits.slice(-8);
  return raw;
}

function reprojectCoords(coords) {
  const result = proj4("EPSG:25833", "EPSG:4326", coords);
  return [result[0], result[1]];
}

function reprojectGeometry(geom) {
  if (!geom) return geom;
  const type = geom.type;
  if (type === "Point") return { ...geom, coordinates: reprojectCoords(geom.coordinates) };
  if (type === "MultiPoint" || type === "LineString") {
    return { ...geom, coordinates: geom.coordinates.map(reprojectCoords) };
  }
  if (type === "MultiLineString" || type === "Polygon") {
    return { ...geom, coordinates: geom.coordinates.map(ring => ring.map(reprojectCoords)) };
  }
  if (type === "MultiPolygon") {
    return { ...geom, coordinates: geom.coordinates.map(poly => poly.map(ring => ring.map(reprojectCoords))) };
  }
  return geom;
}

function pickProp(feature, keys) {
  if (!feature?.properties) return null;
  for (const key of keys) {
    const value = feature.properties[key];
    if (value !== null && value !== undefined && String(value).trim() !== "") {
      return value;
    }
  }
  return null;
}

function getGeometryBounds(geom) {
  if (!geom) return null;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const visit = (coords) => {
    if (typeof coords[0] === "number") {
      const x = coords[0], y = coords[1];
      minX = Math.min(minX, x);
      minY = Math.min(minY, y);
      maxX = Math.max(maxX, x);
      maxY = Math.max(maxY, y);
      return;
    }
    coords.forEach(visit);
  };
  visit(geom.coordinates);
  if (!Number.isFinite(minX)) return null;
  return { minX, minY, maxX, maxY };
}

function getFeatureCentroid(feature) {
  const geom = feature?.geometry;
  if (!geom) return null;
  if (geom.type === "Point") return geom.coordinates;
  const bounds = getGeometryBounds(geom);
  if (!bounds) return null;
  return [(bounds.minX + bounds.maxX) / 2, (bounds.minY + bounds.maxY) / 2];
}

function pointInRing(point, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    const intersect = ((yi > point[1]) !== (yj > point[1])) &&
      (point[0] < (xj - xi) * (point[1] - yi) / (yj - yi + 0.0) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function pointInPolygon(point, polygon) {
  if (!pointInRing(point, polygon[0])) return false;
  for (let i = 1; i < polygon.length; i++) {
    if (pointInRing(point, polygon[i])) return false;
  }
  return true;
}

function featureContainsPoint(feature, point) {
  const geom = feature?.geometry;
  if (!geom || !point) return false;
  if (geom.type === "Polygon") return pointInPolygon(point, geom.coordinates);
  if (geom.type === "MultiPolygon") {
    return geom.coordinates.some(poly => pointInPolygon(point, poly));
  }
  return false;
}

function findContainingAghFeature(point) {
  if (!berlinGeoJSON?.features) return null;
  for (const feature of berlinGeoJSON.features) {
    if (featureContainsPoint(feature, point)) return feature;
  }
  return null;
}

function loadDistrictCSV() {
  return new Promise((resolve, reject) => {
    Papa.parse(districtCsvUrl, {
      download: true,
      header: true,
      delimiter: ";",
      skipEmptyLines: true,
      complete: (result) => {
        result.data.forEach(row => {
          const bez = normalizeBez(row.Bezirksnummer);
          const name = (row.Bezirksname || "").trim();
          const winner = (row.Gewinner || "").replace("Die Linke", "Linke");
          if (!bez || !name) return;
          districtByNumber.set(bez, { name, winner });
          districtByName.set(name, { bez, winner });
        });
        resolve();
      },
      error: (err) => reject(err)
    });
  });
}

function loadAghCSV() {
  return new Promise((resolve, reject) => {
    Papa.parse(aghCsvUrl, {
      download: true,
      header: true,
      delimiter: ";",
      skipEmptyLines: true,
      complete: (result) => {
        result.data.forEach(row => {
          const awk = normalizeAwk(row.AWK);
          if (!awk) return;
          const name = (row.Gewaehlte || "").trim();
          const party = normalizeParty(row.Partei);
          const wahlkreis = (row.Wahlkreis || "").trim();
          const percent = (row.Anteil || "").trim();
          const art = (row.Art || "Direkt").trim();
          const note = (row.Hinweis || "").trim();
          if (!aghByAwk.has(awk)) aghByAwk.set(awk, []);
          aghByAwk.get(awk).push({ name, party, wahlkreis, percent, art, note, awk });
        });
        resolve();
      },
      error: (err) => reject(err)
    });
  });
}

function normalizeWkr(value) {
  if (value === null || value === undefined) return "";
  const raw = String(value).trim();
  if (!raw) return "";
  const num = Number.parseInt(raw, 10);
  return Number.isNaN(num) ? raw : String(num);
}

function buildFullName(row) {
  const parts = [
    row.Titel,
    row.Vornamen,
    row.Namenszusatz,
    row.Nachname
  ].map(v => (v || "").trim()).filter(Boolean);
  return parts.join(" ");
}

function pushUnique(list, entry) {
  const key = `${entry.name}|${entry.party}|${entry.role || entry.wahlkreis || entry.awk || entry.art || ""}`;
  if (!list._keys) list._keys = new Set();
  if (list._keys.has(key)) return;
  list._keys.add(key);
  list.push(entry);
}

function loadBtgCSV() {
  return new Promise((resolve) => {
    Papa.parse(btgCsvUrl, {
      download: true,
      header: false,
      delimiter: ";",
      skipEmptyLines: true,
      complete: (result) => {
        const rows = result.data || [];
        const headerIndex = rows.findIndex(r => (r && r[0]) === "Wahlart");
        if (headerIndex === -1) {
          console.warn("BTG CSV header not found. Skipping Bundestag list.");
          return resolve();
        }
        const headers = rows[headerIndex];
        const citywide = [];
        for (let i = headerIndex + 1; i < rows.length; i++) {
          const rowArr = rows[i];
          if (!rowArr || rowArr.length === 0) continue;
          const row = {};
          headers.forEach((h, idx) => { row[h] = rowArr[idx]; });
          if ((row.Wahlart || "").trim() !== "BT") continue;
          if ((row.GebietLandAbk || "").trim() !== "BE") continue;

          const name = buildFullName(row);
          if (!name) continue;
          const party = normalizeParty(row.Gruppenname || row.GruppennameLang);
          const gebietsart = (row.Gebietsart || "").trim();
          const gebietsnummer = normalizeWkr(row.Gebietsnummer);
          const gebietsname = (row.Gebietsname || "").trim();
          const listenplatz = (row.Listenplatz || "").trim();

          if (gebietsart === "Wahlkreis" && gebietsnummer) {
            const role = gebietsname
              ? `Direktmandat WK ${gebietsnummer} – ${gebietsname}`
              : `Direktmandat WK ${gebietsnummer}`;
            const entry = { name, party, role, art: "Direkt", wkr: gebietsnummer };
            if (!btgByWkr.has(gebietsnummer)) btgByWkr.set(gebietsnummer, []);
            pushUnique(btgByWkr.get(gebietsnummer), entry);
          } else if (gebietsart === "Land") {
            const role = listenplatz
              ? `Landesliste Berlin (Listenplatz ${listenplatz})`
              : "Landesliste Berlin";
            const entry = { name, party, role, art: "Liste" };
            pushUnique(citywide, entry);
          }
        }
        btgCitywide = citywide;
        resolve();
      },
      error: (err) => {
        console.warn("BTG CSV could not be loaded. Skipping Bundestag list.", err);
        btgCitywide = [];
        resolve();
      }
    });
  });
}

function parseBvvFile(text) {
  const lines = text.split(/\r?\n/).map(l => l.trimEnd()).filter(l => l.trim() !== "");
  if (lines.length <= 1) return [];
  const dataLines = lines.slice(1);
  const entries = [];
  for (let i = 0; i < dataLines.length; i += 4) {
    const name = (dataLines[i] || "").split("\t")[0]?.trim();
    const role = (dataLines[i + 1] || "").split("\t")[0]?.trim();
    const partyRaw = (dataLines[i + 2] || "").split("\t")[0]?.trim();
    const since = (dataLines[i + 3] || "").split("\t")[0]?.trim();
    if (!name) continue;
    entries.push({
      name,
      party: normalizeParty(partyRaw),
      role: role || "BVV",
      since
    });
  }
  return entries;
}

async function loadBvvLists() {
  const bezirke = Object.keys(bezirkeData);
  await Promise.all(bezirke.map(async (bezirk) => {
    const fileName = `BVV-${bezirk}.txt`;

    try {
      const res = await fetch(fileUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      bvvByBezirk.set(bezirk, parseBvvFile(text));
    } catch (err) {
      console.warn(`BVV list not found for ${bezirk}: ${fileName}`, err);
    }
  }));
}

async function loadWahlkreiseGeoJSON() {
  const source = await shapefile.open(wahlkreiseShpUrl, wahlkreiseDbfUrl);
  const features = [];
  while (true) {
    const result = await source.read();
    if (result.done) break;
    const feature = result.value;
    const bez = normalizeBez(feature.properties?.BEZ);
    const awk = normalizeAwk(feature.properties?.AWK);
    const meta = districtByNumber.get(bez);
    feature.properties = {
      ...feature.properties,
      AWK: awk,
      BEZ: bez,
      name: meta?.name || `Bezirk ${bez}`,
      winner: meta?.winner || ""
    };
    feature.geometry = reprojectGeometry(feature.geometry);
    features.push(feature);
  }
  return { type: "FeatureCollection", features };
}

async function loadBtgGeoJSONFromShapefile() {
  const source = await shapefile.open(btgLocalShpUrl, btgLocalDbfUrl);
  const groups = new Map();
  let index = 0;
  while (true) {
    const result = await source.read();
    if (result.done) break;
    const feature = result.value;
    feature.geometry = reprojectGeometry(feature.geometry);
    const wkr = normalizeWkr(pickProp(feature, [
      "WKR_NR", "WK_NR", "WKR", "WKRNR", "WKNR",
      "Wahlkreis", "Wahlkreisnr", "Wahlkreisnummer"
    ]));
    const name = pickProp(feature, ["WKR_NAME", "WK_NAME", "Wahlkreisname", "NAME", "name"]);
    const key = wkr || name || `row-${index++}`;
    if (!groups.has(key)) {
      groups.set(key, { wkr: wkr || "", name: name || "", polygons: [] });
    }
    const group = groups.get(key);
    const geom = feature.geometry;
    if (!geom) continue;
    if (geom.type === "Polygon") {
      group.polygons.push(geom.coordinates);
    } else if (geom.type === "MultiPolygon") {
      group.polygons.push(...geom.coordinates);
    }
  }
  const features = [];
  for (const group of groups.values()) {
    if (!group.polygons.length) continue;
    features.push({
      type: "Feature",
      properties: {
        WKR_NR: group.wkr || "",
        WKR_NAME: group.name || "",
        name: group.name || group.wkr || ""
      },
      geometry: {
        type: "MultiPolygon",
        coordinates: group.polygons
      }
    });
  }
  return { type: "FeatureCollection", features };
}

function indexAghByBezirk(geojson) {
  aghByBez.clear();
  geojson?.features?.forEach(feature => {
    const bez = normalizeBez(feature.properties?.BEZ);
    const awk = normalizeAwk(feature.properties?.AWK);
    if (!bez || !awk) return;
    if (!aghByBez.has(bez)) aghByBez.set(bez, new Set());
    aghByBez.get(bez).add(awk);
  });
}

function getPartyForBezirk(name, feature) {
  const d = bezirkeData[name];
  if (!d) return "#444";
  if (currentLevel === "abgeordnetenhaus") {
    const awk = normalizeAwk(feature?.properties?.AWK);
    const entries = awk ? (aghByAwk.get(awk) || []) : [];
    const direct = entries.find(e => e.art === "Direkt") || entries[0];
    if (direct?.party) return partyColors[direct.party] || "#888";
  }
  if (currentLevel === "bundestag") {
    const meta = districtByName.get(name);
    if (meta?.winner) return partyColors[meta.winner] || "#888";
  }
  if (currentLevel === "alle") return partyColors[d.bezirk.party] || "#888";
  if (currentLevel === "bezirk") return partyColors[d.bezirk.party] || "#888";
  const reps = d[currentLevel];
  if (!reps || reps.length === 0) return "#444";
  if (Array.isArray(reps)) return partyColors[reps[0].party] || "#888";
  return partyColors[reps.party] || "#888";
}

function styleFeature(feature) {
  const name = feature.properties.name;
  const color = getPartyForBezirk(name, feature);
  return {
    fillColor: color,
    fillOpacity: 0.45,
    color: "#0d0f14",
    weight: 2,
    opacity: 1
  };
}

function highlightFeature(e) {
  const layer = e.target;
  layer.setStyle({ fillOpacity: 0.75, weight: 3, color: "#c8a96e" });
  layer.bringToFront();
}

function resetHighlight(e) {
  if (selectedLayer && e.target === selectedLayer) return;
  geoLayer.resetStyle(e.target);
  e.target.setStyle({ fillOpacity: 0.45, weight: 2, color: "#0d0f14" });
}

function onFeatureClick(e) {
  if (selectedLayer) {
    geoLayer.resetStyle(selectedLayer);
    selectedLayer.setStyle({ fillOpacity: 0.45, weight: 2, color: "#0d0f14" });
  }
  selectedLayer = e.target;
  selectedFeature = e.target.feature;
  selectedLayer.setStyle({ fillOpacity: 0.8, weight: 3, color: "#c8a96e" });
  handleLayerClick("agh", e.target.feature);
}

function initGeoLayer() {
  if (!berlinGeoJSON) return;
  const wasVisible = geoLayer ? map.hasLayer(geoLayer) : true;
  if (geoLayer) { map.removeLayer(geoLayer); geoLayer = null; }
  selectedLayer = null;
  ensurePane("pane-agh", 460);
  geoLayer = L.geoJSON(berlinGeoJSON, {
    pane: "pane-agh",
    style: styleFeature,
    onEachFeature: (feature, layer) => {
      layer.on({ click: onFeatureClick });
      layer.bindTooltip(feature.properties.name, {
        permanent: false, direction: "center",
        className: "district-tooltip",
        opacity: 0.9
      });
    }
  }).addTo(map);

  aghOverlay = geoLayer;
  if (!wasVisible) map.removeLayer(aghOverlay);
  rebuildOverlayControl();
}

function getAllowedLevels(layerId) {
  return layerLevelMap[layerId] || [];
}

function getEffectiveLevels(allowed) {
  if (!allowed || allowed.length === 0) return [];
  if (currentLevel === "alle") return allowed;
  if (allowed.includes(currentLevel)) return [currentLevel];
  return allowed;
}

function buildContextFromFeature(layerId, feature) {
  const context = {
    layerId,
    feature,
    allowedLevels: getAllowedLevels(layerId)
  };

  if (layerId === "agh") {
    context.awk = normalizeAwk(feature.properties?.AWK);
    context.bez = normalizeBez(feature.properties?.BEZ);
    context.bezirkName = feature.properties?.name;
    return context;
  }

  if (layerId === "btg") {
    const wkr = pickProp(feature, ["WKR_NR", "WK_NR", "WKRNR", "WKR", "wkr_nr", "wkr", "Wahlkreis", "wahlkreis", "Wahlkreisnummer"]);
    context.btgWkr = normalizeWkr(wkr);
    context.btgName = pickProp(feature, ["WKR_NAME", "WK_NAME", "wkr_name", "name", "NAME", "Wahlkreisname"]);
    return context;
  }

  if (layerId === "eu") {
    context.citywide = true;
    return context;
  }

  const name = layerId === "bezirke"
    ? getBezirkNameFromFeature(feature)
    : pickProp(feature, ["name", "bezirk", "bezeichnung", "bezirkname"]);
  if (name) {
    context.bezirkName = name;
    const meta = districtByName.get(name);
    if (meta?.bez) context.bez = meta.bez;
  }

  const centroid = getFeatureCentroid(feature);
  const aghFeature = centroid ? findContainingAghFeature(centroid) : null;
  if (aghFeature) {
    const bez = normalizeBez(aghFeature.properties?.BEZ);
    const awk = normalizeAwk(aghFeature.properties?.AWK);
    const bezName = aghFeature.properties?.name;
    if (!context.bez) context.bez = bez;
    if (!context.bezirkName && bezName) context.bezirkName = bezName;
    if (layerId !== "bezirke") context.awk = awk;
  }

  return context;
}

function handleLayerClick(layerId, feature) {
  activeContext = buildContextFromFeature(layerId, feature);
  renderPanel(activeContext);
}

function collectAghEntries(context) {
  if (context?.awk) return aghByAwk.get(context.awk) || [];
  if (context?.bez) {
    const entries = [];
    const awks = aghByBez.get(context.bez);
    if (awks) {
      awks.forEach(awk => {
        const list = aghByAwk.get(awk) || [];
        list.forEach(entry => pushUnique(entries, entry));
      });
    }
    return entries;
  }
  return [];
}

function collectBundestagEntries(context) {
  const entries = [];
  if (context?.btgWkr) {
    const list = btgByWkr.get(context.btgWkr) || [];
    list.forEach(entry => pushUnique(entries, entry));
  }
  btgCitywide.forEach(entry => pushUnique(entries, entry));
  return entries;
}

function renderPanel(context) {
  const scopeList = mapScopeByLevel[currentLevel] || [];
  const scopeHtml = scopeList.length
    ? `<div class="rep-card">
        <div class="rep-level">Kartebenen</div>
        <div class="rep-role">${scopeList.join(" · ")}</div>
      </div>`
    : "";

  if (!context) {
    document.getElementById('districtInfo').innerHTML = `
      ${scopeHtml}
      <div class="empty-state">
        <div class="empty-icon">🗺️</div>
        <div class="empty-text">Bezirk auf der Karte auswählen</div>
      </div>`;
    return;
  }

  const allowed = context.allowedLevels || getAllowedLevels(context.layerId);
  const levels = getEffectiveLevels(allowed);
  const bezData = context.bezirkName ? bezirkeData[context.bezirkName] : null;
  const headerName = context.bezirkName || (context.layerId === "eu" ? "Berlin (Stadtgebiet)" : "Berlin");
  const headerNr = context.bez || bezData?.nr;

  let html = `
    <div class="district-name-banner">
      ${headerNr ? `<div class="bezirk-nr">Bezirk ${headerNr}</div>` : `<div class="bezirk-nr">Stadtgebiet</div>`}
      <h2>${headerName}</h2>
    </div>
    ${scopeHtml}`;

  for (const lvl of levels) {
    const label = levelLabels[lvl];
    if (lvl === "bezirk") {
      const entries = context.bezirkName ? (bvvByBezirk.get(context.bezirkName) || []) : [];
      if (entries.length > 0) {
        entries.forEach(entry => {
          const sinceText = entry.since ? ` · seit ${entry.since}` : "";
          html += `<div class="rep-card">
            <div class="rep-level">${label}</div>
            <div class="rep-name">${entry.name}</div>
            <span class="rep-party party-${entry.party}">${entry.party}</span>
            <div class="rep-role">${entry.role}${sinceText}</div>
          </div>`;
        });
      }
    } else if (lvl === "abgeordnetenhaus") {
      const entries = collectAghEntries(context);
      if (entries.length > 0) {
        const direct = entries.filter(e => e.art === "Direkt");
        const lists = entries.filter(e => e.art !== "Direkt");
        const ordered = direct.concat(lists);
        ordered.forEach(entry => {
          const isList = entry.art !== "Direkt";
          const awkLabel = entry.awk ? `WK ${entry.awk}` : "";
          const labelText = isList ? "Bezirksliste" : label;
          const role = isList
            ? (entry.note ? `Bezirksliste · ${entry.note}${awkLabel ? ` · ${awkLabel}` : ""}` : `Bezirksliste${awkLabel ? ` · ${awkLabel}` : ""}`)
            : (entry.wahlkreis ? `Direktmandat ${awkLabel} – ${entry.wahlkreis}` : `Direktmandat ${awkLabel}`.trim());
          html += `<div class="rep-card${isList ? " list-entry" : ""}">
            <div class="rep-level">${labelText}</div>
            <div class="rep-name">${entry.name}</div>
            <span class="rep-party party-${entry.party}">${entry.party}</span>
            <div class="rep-role">${role}</div>
          </div>`;
        });
      }
    } else if (lvl === "bundestag") {
      const entries = collectBundestagEntries(context);
      if (entries.length > 0) {
        entries.forEach(entry => {
          const isList = entry.art !== "Direkt";
          html += `<div class="rep-card${isList ? " list-entry" : ""}">
            <div class="rep-level">${label}</div>
            <div class="rep-name">${entry.name}</div>
            <span class="rep-party party-${entry.party}">${entry.party}</span>
            <div class="rep-role">${entry.role}</div>
          </div>`;
        });
      }
    } else if (lvl === "eu") {
      const entries = euCitywide;
      if (entries.length > 0) {
        entries.forEach(entry => {
          html += `<div class="rep-card">
            <div class="rep-level">${label}</div>
            <div class="rep-name">${entry.name}</div>
            <span class="rep-party party-${entry.party}">${entry.party}</span>
            <div class="rep-role">${entry.role}</div>
          </div>`;
        });
      }
    }
  }

  if (!levels.length) {
    html += `<div class="rep-card"><div class="rep-role">Keine passenden Ebenen für diese Ebene.</div></div>`;
  }

  document.getElementById('districtInfo').innerHTML = html;
}

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  initGeoLayer();
  updateLegend();
  renderPanel(activeContext);
}


function updateLegend() {
  const parties = ["CDU","SPD","Grüne","Linke","AfD","FDP","fraktionslos"];
  const legend = document.getElementById('legend');
  legend.innerHTML = parties.map(p => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${partyColors[p]}"></div>
      ${p === "fraktionslos" ? "frakt/" : p}
    </div>`).join('');
}

async function initData() {
  try {
    const results = await Promise.allSettled([
      loadDistrictCSV(),
      loadAghCSV(),
      loadBtgCSV(),
      loadBvvLists(),
      loadBezirkArkis()
    ]);
    if (results[0].status === "rejected" || results[1].status === "rejected") {
      throw new Error("Pflichtdaten konnten nicht geladen werden.");
    }
    berlinGeoJSON = await loadWahlkreiseGeoJSON();
    indexAghByBezirk(berlinGeoJSON);
    initGeoLayer();
    updateLegend();
    renderPanel(activeContext);
  } catch (err) {
    console.error("Daten konnten nicht geladen werden:", err);
    document.getElementById('districtInfo').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">Daten konnten nicht geladen werden. Prüfen Sie die Dateien im Repo.</div>
      </div>`;
  }
}

// Add tooltip style
const style = document.createElement('style');
style.textContent = `.district-tooltip { background: #1a1f2e; border: 1px solid #c8a96e; color: #e8eaf0; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 4px 10px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }`;
document.head.appendChild(style);

initData().then(initOverlayLayers);
</script>
